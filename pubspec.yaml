name: sub_killer
description: SubWatch is a careful local-first subscription watch for device SMS.
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.1
  flutter_riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^2.1.1
  flutter_driver:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    - family: Figtree
      fonts:
        - asset: assets/fonts/Figtree-Variable.ttf
        - asset: assets/fonts/Figtree-Italic-Variable.ttf
          style: italic
    - family: Instrument Serif
      fonts:
        - asset: assets/fonts/InstrumentSerif-Regular.ttf
        - asset: assets/fonts/InstrumentSerif-Italic.ttf
          style: italic


